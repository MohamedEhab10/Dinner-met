<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What's For Dinner</title>
    <link rel="stylesheet" href="../css/all.min.css" />
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../css/index.css" />
  </head>
  <body>
    <div class="navbar-section mb-4">
      <nav class="navbar navbar-expand-md py-3">
        <div class="container">
          <div class="nav-left d-flex flex-row align-items-center">
            <div class="nav-icon">
              <i class="fa-solid fa-utensils text-white"></i>
            </div>
            <div class="nav-text">
              <h3>What's For Dinner</h3>
              <p>Your daily meal inspiration</p>
            </div>
          </div>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <i class="fa-solid fa-bars"></i>
          </button>
          <div
            class="nav-right collapse navbar-collapse"
            id="navbarSupportedContent"
          >
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item d-flex flex-wrap">
                <i class="fa-solid fa-bookmark m-1"></i>
                <p>Saved Recipes</p>
              </li>
              <li class="nav-item d-flex flex-wrap">
                <i class="fa-solid fa-clock-rotate-left m-1"></i>
                <p>Recent</p>
              </li>
              <li class="nav-item d-flex flex-wrap">
                <i class="fa-solid fa-gear m-1"></i>
                <p>Settings</p>
              </li>
              <li class="nav-item nav-avatar d-flex">
                <img
                  class="w-100 rounded-circle"
                  src="../images/avatar-4.jpg"
                  alt="nav-avatar"
                />
                <p>Profile</p>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>
    <header id="card" class="m-auto h-100"></header>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/index.js"></script>
  </body>
</html>
